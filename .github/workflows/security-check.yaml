name: Security Self-Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 매주 월요일 오전 9시 (KST) = 일요일 자정 (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch:  # 수동 실행 허용

# =============================================================================
# GHAS 스타일 보안 스캔
# - "Security scan results" 체크를 브랜치 보호 규칙에 추가하여 PR 머지 제어
# - Settings → Branches → Branch protection rules에서 설정
# =============================================================================

jobs:
  # 기본 보안 스캔 (GHAS 대체)
  security-scan:
    name: Security Scan
    runs-on: jhl-space
    permissions:
      contents: read
      security-events: write  # SARIF 업로드
      pull-requests: write    # PR 코멘트
      checks: write           # Check Run 생성 (GHAS 스타일)
      statuses: write         # Commit Status API

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 (secret scanning에 필요)

      - name: Run Security Scan (Self-Check)
        id: security
        uses: ./  # 자기 자신을 사용
        with:
          # 기본 스캐너
          secret-scan: 'true'
          secret-scan-history: 'true'  # Git history 전체 스캔
          code-scan: 'true'
          dependency-scan: 'true'
          # 추가 스캐너
          iac-scan: 'true'  # Dockerfile, GitHub Actions 스캔
          # SonarQube/AI는 비활성화
          sonar-scan: 'false'
          ai-review: 'false'
          # SBOM 생성
          sbom-generate: 'true'
          sbom-format: 'cyclonedx-json'
          sbom-output: 'sbom.json'
          # 공통 설정
          severity-threshold: 'high'
          fail-on-findings: 'false'  # 테스트 픽스처 때문에 일단 비활성화
          sarif-output: 'security-results.sarif'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true  # private repo에서는 실패할 수 있음
        with:
          sarif_file: security-results.sarif

      - name: Upload SBOM as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.json
          retention-days: 30

      - name: Security Scan Summary
        if: always()
        run: |
          echo "## 🛡️ Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GHAS-Style Checks Created" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Security scan results** - Required status check for branch protection" >> $GITHUB_STEP_SUMMARY
          echo "- 🔐 Secret Scan" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Code Scan" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Dependency Scan" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ IaC Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Findings" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Findings | ${{ steps.security.outputs.findings-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | ${{ steps.security.outputs.critical-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| High | ${{ steps.security.outputs.high-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 SARIF: \`${{ steps.security.outputs.sarif-file }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 SBOM: \`${{ steps.security.outputs.sbom-file }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Branch Protection" >> $GITHUB_STEP_SUMMARY
          echo "Add **Security scan results** as required status check:" >> $GITHUB_STEP_SUMMARY
          echo "Settings → Branches → Add rule → Require status checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.security.outputs.findings-count }}" != "0" ]; then
            echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
            echo "> Security issues were found. Review the **Security scan results** check for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "> [!NOTE]" >> $GITHUB_STEP_SUMMARY
            echo "> No security issues found. All checks passed." >> $GITHUB_STEP_SUMMARY
          fi

  # 컨테이너 이미지 스캔 (빌드 후)
  container-scan:
    name: Container Scan
    runs-on: jhl-space
    needs: build-test  # 빌드 완료 후 실행
    permissions:
      contents: read
      checks: write
      statuses: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: security-action:scan-test
          cache-from: type=gha

      - name: Run Container Scan
        id: container-scan
        uses: ./
        with:
          # 기본 스캐너 비활성화
          secret-scan: 'false'
          code-scan: 'false'
          dependency-scan: 'false'
          # 컨테이너 스캔만 활성화
          container-scan: 'true'
          container-image: 'security-action:scan-test'
          # 설정
          severity-threshold: 'critical'
          fail-on-findings: 'false'
          sarif-output: 'container-scan.sarif'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Container Scan Summary
        if: always()
        run: |
          echo "## 🐳 Container Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Created" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Security scan results** - Container vulnerabilities check" >> $GITHUB_STEP_SUMMARY
          echo "- 🐳 Container Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`security-action:scan-test\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Findings**: ${{ steps.container-scan.outputs.findings-count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Threshold**: critical (only critical issues block)" >> $GITHUB_STEP_SUMMARY

  # Docker 이미지 빌드 테스트
  build-test:
    name: Build Test
    runs-on: jhl-space
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: security-action:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Python 린팅 (Docker로 실행)
  lint:
    name: Lint & Type Check
    runs-on: jhl-space
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Ruff in Docker
        run: |
          docker run --rm -v $(pwd):/app -w /app python:3.11-slim sh -c "
            pip install -q ruff mypy pydantic pydantic-settings httpx PyYAML 'rich>=13.5.0,<14.0.0' &&
            echo '=== Ruff Lint ===' &&
            ruff check src/ &&
            echo '=== Ruff Format ===' &&
            ruff format --check src/
          "
