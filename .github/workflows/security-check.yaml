name: Security Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # 매주 일요일 자정 (UTC)
  workflow_dispatch:

# =============================================================================
# 🛡️ Security Report - Required Status Check
# Settings → Branches → Branch protection rules → "🛡️ Security Report"
# =============================================================================

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 🛡️ Security Jobs
  # ─────────────────────────────────────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan
    runs-on: jhl-space
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      checks: write
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Security Scan
        id: scan
        uses: ./
        with:
          secret-scan: 'true'
          secret-scan-history: 'true'
          code-scan: 'true'
          dependency-scan: 'true'
          iac-scan: 'true'
          sbom-generate: 'true'
          sbom-format: 'cyclonedx-json'
          sbom-output: 'sbom.json'
          check-name: '🛡️ Security Report'
          severity-threshold: 'high'
          fail-on-findings: 'false'
          sarif-output: 'security-results.sarif'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: security-results.sarif

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.json
          retention-days: 30

    outputs:
      findings-count: ${{ steps.scan.outputs.findings-count }}
      critical-count: ${{ steps.scan.outputs.critical-count }}
      high-count: ${{ steps.scan.outputs.high-count }}
      sarif-file: ${{ steps.scan.outputs.sarif-file }}
      sbom-file: ${{ steps.scan.outputs.sbom-file }}

  container-scan:
    name: 🛡️ Container Scan
    runs-on: jhl-space
    needs: build
    permissions:
      contents: read
      checks: write
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: security-action:scan
          cache-from: type=gha

      - name: Run Container Scan
        id: scan
        uses: ./
        with:
          secret-scan: 'false'
          code-scan: 'false'
          dependency-scan: 'false'
          container-scan: 'true'
          container-image: 'security-action:scan'
          skip-check: 'true'  # 🐳 Container Scan 체크만 생성 (Required Check 건너뜀)
          severity-threshold: 'critical'
          fail-on-findings: 'false'
          sarif-output: 'container-scan.sarif'
          github-token: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      findings-count: ${{ steps.scan.outputs.findings-count }}

  # ─────────────────────────────────────────────────────────────────────────
  # 🔧 Build & Lint Jobs
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: 🔧 Build
    runs-on: jhl-space
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: security-action:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    name: 🔧 Lint
    runs-on: jhl-space
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Ruff
        run: |
          docker run --rm -v $(pwd):/app -w /app python:3.11-slim sh -c "
            pip install -q ruff &&
            ruff check src/ &&
            ruff format --check src/
          "

  # ─────────────────────────────────────────────────────────────────────────
  # 📊 Summary Job (통합 리포트)
  # ─────────────────────────────────────────────────────────────────────────
  summary:
    name: 📊 Summary
    runs-on: jhl-space
    needs: [security-scan, container-scan]
    if: always()

    steps:
      - name: Generate Security Report
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🛡️ Security Report

          ## Overview
          | Scan Type | Findings |
          |-----------|----------|
          | Code & Dependencies | ${{ needs.security-scan.outputs.findings-count || 'N/A' }} |
          | Container Image | ${{ needs.container-scan.outputs.findings-count || 'N/A' }} |

          ## Severity Breakdown
          | Level | Count |
          |-------|-------|
          | 🔴 Critical | ${{ needs.security-scan.outputs.critical-count || '0' }} |
          | 🟠 High | ${{ needs.security-scan.outputs.high-count || '0' }} |

          ## Check Runs
          | Check | Description |
          |-------|-------------|
          | 🛡️ Security Report | Required status check for branch protection |
          | 🔐 Secret Scan | Hardcoded secrets detection |
          | 🔍 Code Scan | Static analysis (SAST) |
          | 📦 Dependency Scan | Vulnerability scan (SCA) |
          | 🏗️ IaC Scan | Infrastructure as Code |
          | 🐳 Container Scan | Container image vulnerabilities |

          ## Artifacts
          | Type | File |
          |------|------|
          | SARIF | `${{ needs.security-scan.outputs.sarif-file || 'security-results.sarif' }}` |
          | SBOM | `${{ needs.security-scan.outputs.sbom-file || 'sbom.json' }}` |

          ---
          > **Branch Protection**: Add `🛡️ Security Report` as required status check
          EOF
